name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy

    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          cache: true

      - name: Cache Vite
        uses: actions/cache@v4
        with:
          path: node_modules/.vite
          key: vite-${{ hashFiles('bun.lock') }}
          restore-keys: |
            vite-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun run test:run --exclude src/test/integration/recording-to-vault.test.ts

      - name: Run integration tests (excluding pre-existing encrypted timeout)
        run: bun run test:run src/test/integration/recording-to-vault.test.ts -t "^(?!.*encrypted)"

      - name: Build
        run: bun run build

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
